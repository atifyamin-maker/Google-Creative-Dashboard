<script>
const DATA = JSON.parse(document.getElementById('fatigue-data').textContent);
const U = DATA.units, M = DATA.meta;
const RUP = n => '₹' + (n>=1e5 ? (n/1e5).toFixed(1)+'L' : n>=1e3 ? (n/1e3).toFixed(1)+'k' : Math.round(n));
const PC = x => x==null ? '<span class="mut">—</span>' : (x*100).toFixed(1)+'%';
const DELTA = x => x==null ? '' :
  `<span class="${x>0?'up':'dn'}">${x>0?'▲':'▼'}${Math.abs(x*100).toFixed(0)}%</span>`;
// for CTR/hook a drop is bad (red); for CPI a rise is bad (red)
const DGOOD = x => x==null?'' : `<span class="${x>=0?'up':'dn'}">${x>0?'▲':'▼'}${Math.abs(x*100).toFixed(0)}%</span>`;
const DBAD  = x => x==null?'' : `<span class="${x<=0?'up':'dn'}">${x>0?'▲':'▼'}${Math.abs(x*100).toFixed(0)}%</span>`;

let filt = {bucket:null, product:new Set(), os:new Set(), ctype:new Set(), q:''};
let sortKey='score', sortDir=-1, openRow=null;

const BUCKETS=['Retire','Refresh','Watch','Keep','New','LowVol'];
const BLABEL={Retire:'Retire',Refresh:'Refresh',Watch:'Watch',Keep:'Keep / Scale',New:'Learning',LowVol:'Low volume'};

function counts(list){const c={};BUCKETS.forEach(b=>c[b]=0);list.forEach(u=>c[u.bucket]++);return c;}

function renderBuckets(){
  const c=counts(U), sp={};BUCKETS.forEach(b=>sp[b]=0);
  U.forEach(u=>sp[u.bucket]+=u.spend7);
  document.getElementById('buckets').innerHTML=BUCKETS.map(b=>
    `<div class="b ${b} ${filt.bucket===b?'active':''}" data-b="${b}">
      <div class="l">${BLABEL[b]}</div><div class="n">${c[b]}</div>
      <div class="s">${RUP(sp[b])} / 7d</div></div>`).join('');
  document.querySelectorAll('.b').forEach(el=>el.onclick=()=>{
    filt.bucket = filt.bucket===el.dataset.b ? null : el.dataset.b; openRow=null; render();});
}

function renderControls(){
  const uniq=k=>[...new Set(U.map(u=>u[k]).filter(Boolean))].sort();
  const grp=(k,vals)=>vals.map(v=>`<div class="chip ${filt[k].has(v)?'on':''}" data-k="${k}" data-v="${v}">${v}</div>`).join('');
  document.getElementById('controls').innerHTML =
    grp('product',uniq('product'))+grp('os',uniq('os'))+grp('ctype',uniq('ctype'))+
    `<input class="search" id="q" placeholder="search asset / campaign…" value="${filt.q}">`;
  document.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{
    const s=filt[el.dataset.k]; s.has(el.dataset.v)?s.delete(el.dataset.v):s.add(el.dataset.v);
    openRow=null; render();});
  const q=document.getElementById('q');
  q.oninput=()=>{filt.q=q.value.toLowerCase(); openRow=null; renderTable();};
}

const COLS=[['name','Asset'],['ckey','Segment'],['age','Age'],['label','Rating'],
  ['spend7','Spend 7d'],['ctr7','CTR'],['hook7','Hook'],['cpi7','CPI'],
  ['score','Fatigue'],['bucket','Action']];

function filtered(){
  return U.filter(u=>{
    if(filt.bucket && u.bucket!==filt.bucket) return false;
    if(filt.product.size && !filt.product.has(u.product)) return false;
    if(filt.os.size && !filt.os.has(u.os)) return false;
    if(filt.ctype.size && !filt.ctype.has(u.ctype)) return false;
    if(filt.q){const h=(u.name+' '+u.campaign+' '+u.ckey).toLowerCase(); if(!h.includes(filt.q)) return false;}
    return true;
  });
}

function renderHead(){
  document.getElementById('head').innerHTML=COLS.map(([k,l])=>
    `<th data-k="${k}">${l}${sortKey===k?(sortDir<0?' ▾':' ▴'):''}</th>`).join('');
  document.querySelectorAll('#head th').forEach(el=>el.onclick=()=>{
    if(sortKey===el.dataset.k) sortDir*=-1; else {sortKey=el.dataset.k; sortDir=-1;}
    renderTable();});
}

function spark(series,key,invert){
  const pts=series.map(s=>s[key]).filter(v=>v!=null);
  if(pts.length<2) return '<span class="mut">n/a</span>';
  const w=140,h=34,mn=Math.min(...pts),mx=Math.max(...pts),rg=(mx-mn)||1;
  const step=w/(pts.length-1);
  const xy=pts.map((v,i)=>[i*step, h-2-((v-mn)/rg)*(h-4)]);
  const d=xy.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const last=pts[pts.length-1], first=pts[0];
  const rising = last>first;
  const col = invert ? (rising?'var(--red)':'var(--grn)') : (rising?'var(--grn)':'var(--red)');
  return `<svg width="${w}" height="${h}"><path d="${d}" fill="none" stroke="${col}" stroke-width="1.6"/>
    <circle cx="${xy[xy.length-1][0].toFixed(1)}" cy="${xy[xy.length-1][1].toFixed(1)}" r="2.5" fill="${col}"/></svg>`;
}

function drill(u){
  const med = u.ckey_cpi_med;
  const wt = `<table class="wt"><tr><th></th><th>Last 7d</th><th>Prior 30d avg</th><th>Δ</th></tr>
    <tr><td>CTR</td><td>${PC(u.ctr7)}</td><td>${PC(u.ctr_base)}</td><td>${DGOOD(u.ctr_chg)}</td></tr>
    <tr><td>Hook (25%)</td><td>${PC(u.hook7)}</td><td>${PC(u.hook_base)}</td><td>${DGOOD(u.hook_chg)}</td></tr>
    <tr><td>CPI</td><td>${u.cpi7!=null?RUP(u.cpi7):'—'}</td><td>${u.cpi_base!=null?RUP(u.cpi_base):'—'}</td><td>${DBAD(u.cpi_chg)}</td></tr>
    <tr><td>Impr (7d vs prior 7d)</td><td>${u.impr7.toLocaleString()}</td><td>—</td><td>${DBAD(u.impr_wow)}</td></tr>
    </table>`;
  const cohort = med!=null ? `<div class="reason">Segment (${u.ckey}) median CPI 30d: <b>${RUP(med)}</b> · this asset: <b>${u.cpi7!=null?RUP(u.cpi7):'n/a'}</b>${!u.cpi_trust?' <span class="mut">(CPI low-confidence: <'+`${5}`+' installs/30d)</span>':''}</div>`:'';
  const reasons = u.leading.length||u.lagging
    ? `<div class="reason"><b>Signals:</b> ${u.leading.join(' · ')||'—'}${u.lagging?' <span class="dn">· CPI rising (lagging)</span>':''}</div>`
    : `<div class="reason mut">No fatigue signals firing.</div>`;
  const thumb = u.yid ? `<img src="https://img.youtube.com/vi/${u.yid}/mqdefault.jpg" width="160" style="border-radius:8px;float:right;margin-left:14px" loading="lazy">`:'';
  const link = u.url ? `<a href="${u.url}" target="_blank">open on YouTube ↗</a>`:'';
  return `<td colspan="${COLS.length}"><div>${thumb}
    <div class="spk">
      <div><div class="u">CTR (weekly)</div>${spark(u.series,'ctr',false)}</div>
      <div><div class="u">Hook rate (weekly)</div>${spark(u.series,'hook',false)}</div>
      <div><div class="u">CPI (weekly)</div>${spark(u.series,'cpi',true)}</div>
    </div>${wt}${reasons}${cohort}
    <div class="reason mut">Age ${u.age}d · ${u.product}/${u.os}/${u.ctype} · ${u.campaign} · ${link}</div>
    </div></td>`;
}

function renderTable(){
  const list=filtered();
  const dir=sortDir, k=sortKey;
  list.sort((a,b)=>{let x=a[k],y=b[k];
    if(typeof x==='string'){x=x||'';y=y||'';return x<y?-dir:x>y?dir:0;}
    x=x==null?-1e12:x;y=y==null?-1e12:y;return (x-y)*dir;});
  const tb=document.getElementById('tb'); tb.innerHTML='';
  list.forEach(u=>{
    const tr=document.createElement('tr');tr.className='row';
    tr.innerHTML=`<td class="name">${u.name}<div class="tag">${u.product}/${u.os} · ${u.state}</div></td>
      <td class="tag">${u.ckey}</td>
      <td>${u.age}d</td>
      <td>${u.label?`<span class="lab ${u.label}">${u.label}</span>`:'<span class="mut">—</span>'}</td>
      <td>${RUP(u.spend7)}</td>
      <td>${PC(u.ctr7)} ${DGOOD(u.ctr_chg)}</td>
      <td>${PC(u.hook7)} ${DGOOD(u.hook_chg)}</td>
      <td>${u.cpi7!=null?RUP(u.cpi7):'<span class="mut">—</span>'} ${DBAD(u.cpi_chg)}</td>
      <td><b>${u.score}</b></td>
      <td><span class="badge ${u.bucket}">${BLABEL[u.bucket]}</span></td>`;
    const id=u.aid+'|'+u.ckey;
    tr.onclick=()=>{openRow = openRow===id?null:id; renderTable();};
    tb.appendChild(tr);
    if(openRow===id){const d=document.createElement('tr');d.className='drill';d.innerHTML=drill(u);tb.appendChild(d);}
  });
  document.getElementById('foot').innerHTML =
    `Showing <b>${list.length}</b> of ${U.length} asset×segment units. `+
    `Green ▲ = good, red = fatigue direction (CTR/hook: down is bad; CPI: up is bad).<br>`+
    `Thresholds: judge only after ${M.thresholds.MIN_AGE_DAYS}d & ≥${M.thresholds.MIN_IMPR_7D.toLocaleString()} impr/7d. `+
    `Leading = rating LOW, CTR/hook down ≥${M.thresholds.CTR_DROP*100}% vs 30d, impr down ≥${M.thresholds.IMPR_DROP*100}% WoW. `+
    `Lagging = CPI up ≥${M.thresholds.CPI_RISE*100}% vs 30d. Retire also needs ≥${RUP(M.thresholds.MIN_RETIRE_SPEND_7D)} spend/7d.<br>`+
    `Fatigue score 0–100 = weighted severity (CPI 30%, CTR 20%, hook 20%, impr 15%, LOW rating 15%); higher = worse. `+
    `Note: per-asset CPI uses Google's fractional cost — read the trend, not the absolute.`;
}

function render(){renderBuckets();renderControls();renderHead();renderTable();}
document.getElementById('sub').textContent =
  `Data through ${M.end} · generated ${M.generated} · click any row for trend & signals`;
render();
</script></body></html>
